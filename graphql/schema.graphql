type Product {
    id: ID!
    name: String!
    description: String
    price: Float!
    stock: Int!
}

type Query {
    products: [Product!]! @all
}

# Mutations for managing products #
type Mutation {
    createProduct(
        name: String!
        description: String
        price: Float!
        stock: Int!
    ): Product! @create
}
